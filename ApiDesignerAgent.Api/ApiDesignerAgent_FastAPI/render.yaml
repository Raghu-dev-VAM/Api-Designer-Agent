services:
  - type: web
    name: api-designer-agent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -c gunicorn_config.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DEBUG
        value: false
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /api/health
