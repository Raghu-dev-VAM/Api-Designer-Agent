services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: api-designer-agent-api
    runtime: python
    rootDir: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -c gunicorn_config.py
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DEBUG
        value: false
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        sync: false

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: api-designer-agent-frontend
    runtime: static
    rootDir: api-designer-agent-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
