name: Build, Scan & Deploy

on:
  push:
    branches:
      - main

env:
  CI: false

jobs:
  build:
    name: Build and CodeQL Scan
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'python' ]

    steps:
      # -------------------------
      # CHECKOUT REPOSITORY
      # -------------------------

      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # INITIALIZE CODEQL
      # -------------------------

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # -------------------------
      # FRONTEND SETUP
      # -------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: api-designer-agent-react
        run: npm install

      - name: Build frontend
        working-directory: api-designer-agent-react
        run: npm run build

      # -------------------------
      # BACKEND SETUP (FASTAPI)
      # -------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify backend
        working-directory: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI
        run: |
          python -m compileall .

      # -------------------------
      # PERFORM CODEQL ANALYSIS
      # -------------------------

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # -------------------------
      # SEND EMAIL NOTIFICATION
      # -------------------------

      - name: Send email notification
        if: success()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: "✅ CodeQL Scan Completed - ${{ github.repository }}"

          to: guravshital11@gmail.com

          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>

          body: |
            Hello,

            The CodeQL scan for ${{ github.repository }} has finished successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.workflow }}
            Run Number: ${{ github.run_number }}

            View Workflow Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            View Code Scanning Results:
            https://github.com/${{ github.repository }}/security/code-scanning

            Regards,
            GitHub Actions

      # -------------------------
      # UPLOAD FRONTEND ARTIFACTS
      # -------------------------

      - name: Upload frontend production files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: api-designer-agent-react/dist

      # -------------------------
      # UPLOAD BACKEND ARTIFACTS
      # -------------------------

      - name: Upload backend files
        uses: actions/upload-artifact@v4
        with:
          name: backend-files
          path: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI

  deploy:
    name: Deploy Frontend
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      # -------------------------
      # DOWNLOAD FRONTEND ARTIFACT
      # -------------------------

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./build

      # -------------------------
      # VERIFY FILES
      # -------------------------

      - name: Verify frontend files
        run: ls -la ./build

      # -------------------------
      # DEPLOY TO GITHUB PAGES
      # -------------------------

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.TOKEN }}
          publish_dir: ./build
