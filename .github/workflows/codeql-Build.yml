name: Build, Scan & Deploy

on:
  push:
    branches:
      - main

env:
  CI: false

jobs:
  build:
    name: Build and CodeQL Scan
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'python' ]

    steps:
      # Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # FRONTEND SETUP
      # -------------------------

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: api-designer-agent-react
        run: npm install

      # Build frontend
      - name: Build frontend
        working-directory: api-designer-agent-react
        run: npm run build

      # -------------------------
      # BACKEND SETUP (FastAPI)
      # -------------------------

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Optional: Run backend syntax check
      - name: Verify backend
        working-directory: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI
        run: |
          python -m compileall .

      # -------------------------
      # CODEQL INIT
      # -------------------------

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # -------------------------
      # CODEQL ANALYSIS
      # -------------------------

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # -------------------------
      # UPLOAD ARTIFACTS
      # -------------------------

      # Upload frontend build files
      - name: Upload frontend production files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: api-designer-agent-react/dist

      # Upload backend files
      - name: Upload backend files
        uses: actions/upload-artifact@v4
        with:
          name: backend-files
          path: ApiDesignerAgent.Api/ApiDesignerAgent_FastAPI

  deploy:
    name: Deploy Frontend
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      # Download frontend artifact
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./build

      # Verify frontend files
      - name: Verify frontend files
        run: ls -la ./build

      # Deploy frontend to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.TOKEN }}
          publish_dir: ./build
